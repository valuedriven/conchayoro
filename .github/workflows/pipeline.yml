name: Pipeline

on:
  push:
    branches: [ main ]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  ANSIBLE_REMOTE_USER: ec2-user
  ANSIBLE_PRIVATE_KEY_FILE: ambiente/conchayoro-key
  ANSIBLE_HOST_KEY_CHECKING: 'False'
  TAG: latest
  PROJECT_NAME: conchayoro
  DATABASE_PROJECT: db
  DATABASE_IMAGE: conchayoro/db:latest
  BACKEND_PROJECT: backend
  BACKEND_IMAGE: conchayoro/backend:latest
  FRONTEND_PROJECT: frontend
  FRONTEND_IMAGE: conchayoro/frontend:latest
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2
      with:
        node-version: '14'
        cache: 'npm'    
    - run: npm install eslint eslint-config-prettier eslint-plugin-prettier prettier-eslint --save-dev
    - run: npm install eslint-plugin-vue --save-dev --prefix=frontend
    - run: npm run eslint
    - run: npm ci --prefix=backend
    - run: npm ci --prefix=frontend
    - run: npm run build --prefix=frontend
    - uses: actions/cache@v2            
      with:
        path: 
          ./db
          ./backend/node_modules
          ./backend/package*.json
          ./frontend/node_modules
        key: ${{ github.sha }}          
    - uses: actions/upload-artifact@v2
      with:
        path: |
          frontend/dist
    
  # build-image-db:
  #   needs: build
  #   runs-on: ubuntu-latest    
  #   steps:
  #   - uses: actions/cache@v2            
  #     with:
  #       path: ./db
  #       key: ${{ github.sha }}
  #   - run: ls -la
  #   - run: docker build -t $DATABASE_IMAGE $DATABASE_PROJECT

  build-push-image-db:
    needs: build
    runs-on: ubuntu-latest    
    steps:
    - uses: actions/cache@v2            
      with:
        path: ./db
        key: ${{ github.sha }}
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: Build, tag, e push de imagem para Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: $DATABASE_PROJECT
        IMAGE_TAG: $TAG
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $DATABASE_PROJECT
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

